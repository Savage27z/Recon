[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
hashkey_testnet = "${HASHKEY_TESTNET_RPC}"
hashkey_mainnet = "${HASHKEY_MAINNET_RPC}"

[etherscan]
hashkey_testnet = { key = "${VERIFIER_API_KEY}", url = "https://testnet-explorer.hsk.xyz/api", chain = 133 }
hashkey_mainnet = { key = "${VERIFIER_API_KEY}", url = "https://hsk.blockscout.com/api", chain = 177 }
